name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Test
        run: go test ./...

      - name: Build archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          platforms=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )
          for platform in "${platforms[@]}"; do
            read -r goos goarch <<< "$platform"
            name="tickgit_${goos}_${goarch}"
            binary="tickgit"
            if [[ "$goos" == "windows" ]]; then
              binary="tickgit.exe"
            fi
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags="-s -w" -o "dist/${name}/${binary}" ./cmd/tickgit
            if [[ "$goos" == "windows" ]]; then
              (cd "dist/${name}" && zip -q "../${name}.zip" "$binary")
            else
              tar -C "dist/${name}" -czf "dist/${name}.tar.gz" "$binary"
            fi
          done

      - name: Checksums
        shell: bash
        run: |
          cd dist
          sha256sum ./*.tar.gz ./*.zip > checksums.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/*.tar.gz dist/*.zip dist/checksums.txt --repo "${{ github.repository }}" --generate-notes --latest
